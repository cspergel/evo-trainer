name: evolve-trader

services:
  db:
    image: postgres:16-alpine
    container_name: evolve-trader-db
    environment:
      POSTGRES_DB: evolve_trader
      POSTGRES_USER: evolve_trader
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5434:5432"
    volumes:
      - evolve_trader_pgdata:/var/lib/postgresql/data

  # Test runner — validates the project builds and passes in a clean environment.
  # Phase 5+ will add an app service with FastAPI when the dashboard exists.
  test:
    build: .
    container_name: evolve-trader-test
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://evolve_trader:dev_password@db:5432/evolve_trader

volumes:
  evolve_trader_pgdata:
